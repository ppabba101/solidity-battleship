name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Forge Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: cd contracts && forge build

      - name: Test contracts
        run: cd contracts && forge test -vv

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  presentation:
    name: Generate Presentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install python-pptx
        run: pip install python-pptx

      - name: Generate presentation
        run: python3 presentation/generate.py

      - name: Upload presentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: battleship-presentation
          path: presentation/*.pptx
          if-no-files-found: warn

  # TODO: Add Noir/circuit job once nargo/bb toolchain install is stable.
  # Reference: https://noir-lang.org/docs/getting_started/installation
