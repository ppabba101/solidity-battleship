[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.27"
via_ir = false
optimizer = true
optimizer_runs = 1
ffi = false

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
]

[invariant]
runs = 256
depth = 64
fail_on_revert = false
